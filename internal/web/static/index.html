<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pastel — Deals</title>
  <meta name="theme-color" content="#ffe1f1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Nunito:wght@400;600;700;800&display=swap">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Animated WebGL pastel background (canvas-2D + CSS fallbacks in app.js/style.css). -->
  <canvas id="bg" class="bg-canvas" aria-hidden="true"></canvas>
  <div class="bg-fallback" aria-hidden="true">
    <span class="blob b1"></span><span class="blob b2"></span>
    <span class="blob b3"></span><span class="blob b4"></span>
  </div>
  <!-- Confetti pieces are spawned into here on a watch. -->
  <div id="confetti" class="confetti-layer" aria-hidden="true"></div>

  <header class="topbar">
    <h1 class="logo">
      <span class="mascot" id="mascot" role="img" aria-label="Pastel mascot">
        <picture>
          <source srcset="/pastel.avif" type="image/avif">
          <img src="/pastel.webp" alt="Pastel mascot" width="48" height="49" draggable="false">
        </picture>
      </span>
      <span class="logo-text">Pastel</span>
    </h1>
    <nav class="catnav" id="catnav" aria-label="Deal categories"></nav>
    <div class="topbar-right">
      <button id="watchlist-toggle" class="linkbtn ghost" hidden>★ Watchlist</button>
      <div class="me" id="me"></div>
    </div>
  </header>

  <aside class="drawer" id="drawer" hidden aria-hidden="true">
    <div class="drawer-head">
      <h2>★ Your watchlist</h2>
      <button id="drawer-close" class="linkbtn ghost" aria-label="Close">✕</button>
    </div>
    <form id="watch-add" class="watch-add">
      <input type="text" id="watch-input" placeholder="Add a game to watch…" autocomplete="off">
      <button type="submit" class="linkbtn">Add</button>
    </form>
    <ul id="watch-list" class="watch-list"></ul>
    <div id="watch-empty" class="watch-empty" hidden>
      <picture>
        <source srcset="/pastel.avif" type="image/avif">
        <img class="watch-empty-art" src="/pastel.webp" alt="" width="96" height="98" draggable="false">
      </picture>
      <p>Nothing watched yet 🫧<br>Add a game above or tap ★ on a deal.</p>
    </div>
  </aside>
  <div class="drawer-scrim" id="drawer-scrim" hidden></div>

  <main class="layout">
    <aside class="filters">
      <label class="field">
        <span>Search</span>
        <input type="search" id="q" placeholder="game title…">
      </label>

      <label class="field">
        <span>Source</span>
        <select id="source"><option value="">All</option></select>
      </label>

      <label class="field">
        <span>Store</span>
        <select id="store"><option value="">All</option></select>
      </label>

      <label class="field">
        <span>Min discount %</span>
        <input type="number" id="min_discount" min="0" max="100" step="5" placeholder="0">
      </label>

      <label class="field">
        <span>Max price</span>
        <input type="number" id="max_price" min="0" step="1" placeholder="any">
      </label>

      <label class="checkbox"><input type="checkbox" id="hist_low"> Historical low</label>
      <label class="checkbox"><input type="checkbox" id="free"> Free only</label>
      <label class="checkbox"><input type="checkbox" id="great"> Great deals only</label>

      <label class="field">
        <span>Sort</span>
        <select id="sort">
          <option value="newest">Newest</option>
          <option value="hot">🔥 Heat (most loved)</option>
          <option value="verdict">Best deals</option>
          <option value="discount">Biggest discount</option>
          <option value="price_asc">Price: low → high</option>
          <option value="price_desc">Price: high → low</option>
          <option value="rating">Rating</option>
        </select>
      </label>
    </aside>

    <section class="results">
      <div class="results-head">
        <span id="count" class="count"></span>
      </div>
      <div id="grid" class="grid"></div>
      <div id="empty" class="empty" hidden>
        <picture>
          <source srcset="/pastel.avif" type="image/avif">
          <img class="empty-art" src="/pastel.webp" alt="" width="132" height="134" draggable="false">
        </picture>
        <p>No deals match your filters yet 🫧</p>
      </div>
      <button id="more" class="more" hidden>Load more</button>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
